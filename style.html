<style>
  :root {
    --bg-deep:      #0f0a1e;
    --bg-mid:       #1a1035;
    --accent:       #9b6dff;
    --accent-lit:   #c4a0ff;
    --accent-dim:   #5a3fa0;
    --glass:        rgba(255,255,255,0.06);
    --glass-border: rgba(255,255,255,0.12);
    --text:         #f0eaff;
    --text-muted:   #9c8abf;
    --green:        #1e3d2a;
    --green-text:   #6effa0;
    --blue:         #0e2a42;
    --blue-text:    #66c2ff;
    --yellow:       #3d300a;
    --yellow-text:  #ffd966;
    --radius:       16px;
    --shadow:       0 8px 32px rgba(0,0,0,0.5);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Heebo', sans-serif;
    background: var(--bg-deep);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(100,50,200,0.25) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 80% 80%, rgba(60,20,140,0.3)  0%, transparent 55%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 820px;
    margin: 0 auto;
    padding: 48px 20px 80px;
  }

  .header { text-align: center; margin-bottom: 48px; animation: fadeDown 0.7s ease both; }

  .app-title {
    font-size: clamp(48px, 10vw, 76px);
    font-weight: 800;
    letter-spacing: 6px;
    background: linear-gradient(135deg, #fff 30%, var(--accent-lit));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
    margin-bottom: 10px;
  }

  .subtitle {
    font-size: 18px;
    font-weight: 300;
    color: var(--text-muted);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .card {
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius);
    padding: 32px;
    margin-bottom: 24px;
    backdrop-filter: blur(12px);
    box-shadow: var(--shadow);
    animation: fadeUp 0.6s ease both;
  }

  .card h2 {
    font-size: 20px;
    font-weight: 600;
    color: var(--accent-lit);
    text-align: center;
    margin-bottom: 24px;
    letter-spacing: 1px;
  }

  #pass {
    -webkit-text-security: disc;
    text-security: disc;
    direction: rtl;
    unicode-bidi: plaintext;
    font-family: Arial, sans-serif;
  }

  select, input[type="text"] {
    width: 100%;
    padding: 14px 16px;
    margin-bottom: 14px;
    background: rgba(255,255,255,0.07);
    border: 1px solid var(--glass-border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Heebo', sans-serif;
    font-size: 16px;
    direction: rtl;
    transition: border-color 0.2s, box-shadow 0.2s;
    appearance: none;
  }

  select:focus, input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(155,109,255,0.2);
  }

  select option { background: var(--bg-mid); color: var(--text); }

  .btn {
    display: block;
    width: 100%;
    padding: 15px;
    font-family: 'Heebo', sans-serif;
    font-size: 17px;
    font-weight: 700;
    color: white;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
    letter-spacing: 1px;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent-dim), var(--accent));
    box-shadow: 0 6px 24px rgba(155,109,255,0.35);
  }

  .btn-primary:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 10px 30px rgba(155,109,255,0.5);
  }

  .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

  .btn-secondary {
    background: linear-gradient(135deg, #2a1a5e, var(--accent-dim));
    border: 1px solid var(--glass-border);
  }

  .btn-secondary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
  }

  .loader {
    display: none;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-top: 18px;
    color: var(--text-muted);
    font-size: 14px;
  }

  .loader.active { display: flex; }

  .spinner {
    width: 22px; height: 22px;
    border: 3px solid rgba(255,255,255,0.1);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    flex-shrink: 0;
  }

  .table-wrapper { overflow-x: auto; margin-top: 16px; border-radius: 10px; }

  table { border-collapse: collapse; width: 100%; min-width: 500px; font-size: 14px; }

  th {
    background: var(--accent-dim);
    color: white;
    padding: 12px 10px;
    font-weight: 600;
    white-space: nowrap;
  }

  td {
    border: 1px solid rgba(255,255,255,0.08);
    padding: 10px;
    text-align: center;
    background: rgba(255,255,255,0.03);
    color: var(--text);
  }

  tr:nth-child(even) td { background: rgba(255,255,255,0.06); }

  td.green  { background: var(--green);  color: var(--green-text);  }
  td.blue   { background: var(--blue);   color: var(--blue-text);   }
  td.yellow { background: var(--yellow); color: var(--yellow-text); }

  .legend { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; font-size: 13px; }
  .legend-item { display: flex; align-items: center; gap: 7px; }
  .legend-dot  { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }

  .memorial {
    text-align: center;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    padding: 40px 30px;
    border-radius: var(--radius);
    margin-top: 40px;
    backdrop-filter: blur(8px);
    animation: fadeUp 0.8s 0.3s ease both;
  }

  .memorial img {
    width: 160px; height: 200px;
    object-fit: cover;
    border-radius: 12px;
    border: 3px solid var(--accent);
    margin: 0 auto 20px;
    display: block;
    box-shadow: 0 8px 30px rgba(155,109,255,0.3);
  }

  .memorial h1 { font-size: 22px; font-weight: 600; color: var(--accent-lit); margin-bottom: 6px; line-height: 1.5; }
  .memorial p  { color: var(--text-muted); font-size: 15px; font-weight: 300; margin-top: 10px; }

  .error-msg {
    display: none;
    background: rgba(255,80,80,0.1);
    border: 1px solid rgba(255,80,80,0.3);
    color: #ff9090;
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 14px;
    text-align: center;
    margin-top: 14px;
  }

  .error-msg.visible { display: block; }

  .back-btn {
    margin-bottom: 16px;
    padding: 12px 20px;
    font-size: 15px;
    width: auto;
    display: inline-block;
  }

  @keyframes spin     { to { transform: rotate(360deg); } }
  @keyframes fadeDown { from { opacity:0; transform:translateY(-20px); } to { opacity:1; transform:none; } }
  @keyframes fadeUp   { from { opacity:0; transform:translateY(20px);  } to { opacity:1; transform:none; } }
</style>
