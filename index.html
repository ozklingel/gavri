<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title><?= pageTitle ?></title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Heebo:wght@300;400;600;700;900&display=swap');

    :root {
      --bg:        #0b0f0b;
      --bg2:       #111811;
      --bg3:       #172017;
      --bg4:       #1e2b1e;
      --border:    #2a4a2a;
      --border2:   #3a6a3a;
      --green:     #4ade80;
      --green2:    #22c55e;
      --green3:    #16a34a;
      --green-dim: #2d5a3d;
      --text:      #d1fae5;
      --text2:     #86efac;
      --text3:     #6ee7b7;
      --muted:     #4b7a5a;
      --danger:    #f87171;
      --danger-bg: #2d0a0a;
      --warn:      #fbbf24;
      --mono:      'Share Tech Mono', monospace;
      --body:      'Heebo', sans-serif;
      --radius:    6px;
      --shadow:    0 4px 24px rgba(0,0,0,0.6);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--body);
  font-size: 14px;
  min-height: 100vh;

  width: 100%;
  max-width: 100%;
  overflow-x: hidden;
}

body {
  position: relative;
}

* {
  box-sizing: border-box;
  max-width: 100%;
}

    /* ── TOPBAR ── */
    .topbar {
  background: var(--bg2);
  border-bottom: 2px solid var(--border2);
  padding: 0 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 52px;
  position: sticky;
  top: 0;
  z-index: 100;

  width: 100%;
  max-width: 100%;
  overflow: hidden;
}
    .topbar-brand {
      font-family: var(--mono);
      color: var(--green);
      font-size: 17px;
      font-weight: bold;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .topbar-brand .star { color: var(--green); font-size: 20px; }
    .topbar-brand .sub { color: var(--muted); font-size: 11px; display: block; line-height: 1; }
    .topbar-nav {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .topbar-user {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text2);
      background: var(--bg3);
      border: 1px solid var(--border);
      padding: 4px 10px;
      border-radius: var(--radius);
      margin-left: 10px;
    }
    .topbar-start {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      flex: 1;
    }
    .topbar-menu-btn {
      flex-shrink: 0;
      font-size: 18px;
      line-height: 1;
      padding: 6px 10px;
      min-width: 44px;
      min-height: 44px;
    }
    a.topbar-brand {
      text-decoration: none;
      color: inherit;
      min-width: 0;
    }
    a.topbar-brand:hover { color: var(--green); }

    /* ── APP DRAWER (mobile + desktop) ── */
    .app-drawer-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      z-index: 200;
      opacity: 0;
      transition: opacity 0.25s ease;
      pointer-events: none;
    }
    .app-drawer-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }
    .app-drawer {
      position: fixed;
      top: 0;
      right: 0;
      width: min(360px, 92vw);
      max-width: 100%;
      height: 100%;
      height: 100dvh;
      background: var(--bg2);
      border-left: 2px solid var(--border2);
      z-index: 201;
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.28s ease;
      box-shadow: -8px 0 32px rgba(0, 0, 0, 0.4);
      overflow: hidden;
    }
    .app-drawer.open {
      transform: translateX(0);
    }
    body.drawer-open {
      overflow: hidden;
      touch-action: none;
    }
    .app-drawer-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      padding: 14px 14px 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .app-drawer-brand {
      font-family: var(--mono);
      color: var(--green);
      font-size: 15px;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }
    .app-drawer-brand .star { font-size: 18px; flex-shrink: 0; }
    .app-drawer-brand .sub {
      color: var(--muted);
      font-size: 10px;
      display: block;
      line-height: 1.2;
      font-weight: normal;
    }
    .app-drawer-close {
      flex-shrink: 0;
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text1);
      width: 44px;
      height: 44px;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
    }
    .app-drawer-close:hover { border-color: var(--green); color: var(--green); }
    .app-drawer-user {
      font-family: var(--mono);
      font-size: 13px;
      padding: 12px 14px;
      background: var(--bg3);
      border-bottom: 1px solid var(--border);
      line-height: 1.5;
      flex-shrink: 0;
    }
    .app-drawer-scroll {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .app-drawer-nav {
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .app-drawer-panels {
      padding: 0 10px 12px;
      border-top: 1px solid var(--border);
    }
    .app-drawer-panels .card {
      margin-bottom: 10px;
    }
    .app-drawer-panels .card-body {
      overflow-x: auto;
    }
    .app-drawer-panels .tbl {
      font-size: 11px;
    }
    .app-drawer-panels .stat-num {
      font-size: 18px;
    }
    .drawer-section-title {
      font-family: var(--mono);
      font-size: 12px;
      font-weight: bold;
      color: var(--green);
      margin: 12px 0 8px;
      padding-top: 4px;
    }
    .app-drawer-link {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--bg3);
      color: var(--text1);
      text-decoration: none;
      font-family: var(--mono);
      font-size: 14px;
      min-height: 48px;
      transition: border-color 0.15s, background 0.15s;
    }
    .app-drawer-link:hover,
    .app-drawer-link:focus {
      border-color: var(--green);
      background: var(--bg4);
      color: var(--green);
      outline: none;
    }
    .app-drawer-link-icon {
      font-size: 20px;
      width: 28px;
      text-align: center;
      flex-shrink: 0;
    }
    .app-drawer-foot {
      padding: 12px 14px;
      padding-bottom: max(12px, env(safe-area-inset-bottom));
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    /* ── BUTTONS ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 14px;
      border-radius: var(--radius);
      font-family: var(--mono);
      font-size: 12px;
      font-weight: bold;
      cursor: pointer;
      border: none;
      text-decoration: none;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .btn-primary {
      background: var(--green3);
      color: #fff;
      border: 1px solid var(--green2);
    }
    .btn-primary:hover { background: var(--green2); }
    .btn-secondary {
      background: var(--bg4);
      color: var(--text2);
      border: 1px solid var(--border2);
    }
    .btn-secondary:hover { border-color: var(--green); color: var(--green); }
    .btn-ghost {
      background: transparent;
      color: var(--text2);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { border-color: var(--green2); color: var(--green); }
    .btn-danger {
      background: #7f1d1d;
      color: var(--danger);
      border: 1px solid #b91c1c;
    }
    .btn-danger:hover { background: #991b1b; }
    .btn-sm { padding: 4px 10px; font-size: 11px; }
    .btn-lg { padding: 10px 22px; font-size: 14px; }
    .btn-full { width: 100%; justify-content: center; }
    .btn-icon { padding: 5px 8px; }

    /* ── LINKS as buttons ── */
    a.btn { color: inherit; }
    a.btn-secondary { color: var(--text2); }
    a.btn-secondary:hover { color: var(--green); }
    a.btn-ghost:hover { color: var(--green); }

    /* ── LAYOUT ── */
    .page { padding: 16px 20px 40px; max-width: 1100px; margin: 0 auto; }
    .page-dashboard {
      max-width: none;
      width: 100%;
      box-sizing: border-box;
    }
    .dashboard-search-panel {
      width: 100%;
      margin-bottom: 20px;
      position: relative;
    }
    .dashboard-search-label {
      margin-bottom: 8px;
      font-size: 13px;
    }
    .dashboard-search-row {
      display: flex;
      gap: 10px;
      align-items: stretch;
      width: 100%;
    }
    .dashboard-search-input {
      width: 100%;
      font-size: 15px;
      padding: 12px 14px;
      min-height: 48px;
    }
    .dashboard-search-btn {
      min-width: 96px;
      min-height: 48px;
      flex-shrink: 0;
    }
    .dashboard-search-results {
      position: relative;
      top: auto;
      left: auto;
      right: auto;
      width: 100%;
      margin-top: 8px;
      max-height: min(50vh, 420px);
    }
    #dashboardUserExerciseResults {
      width: 100%;
    }
    .dashboard-tabs {
      display: flex;
      gap: 0;
      border-bottom: 2px solid var(--border);
      margin-bottom: 20px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-gutter: stable;
    }
    .dashboard-tab {
      display: inline-flex;
      align-items: center;
      padding: 10px 16px;
      font-family: var(--mono);
      font-size: 13px;
      color: var(--muted);
      text-decoration: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      white-space: nowrap;
      transition: color 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }
    .dashboard-tab:hover {
      color: var(--text2);
    }
    .dashboard-tab.active {
      color: var(--green);
      border-bottom-color: var(--green);
      font-weight: bold;
    }
    .dashboard-tab-panel {
      width: 100%;
    }
    .page-title {
      font-family: var(--mono);
      font-size: 20px;
      color: var(--green);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .page-title::before {
      content: '▌';
      color: var(--green2);
    }

    /* ── GRID LAYOUTS ── */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
    .grid-auto { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }

    /* ── CARD ── */
    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .card-header {
      background: var(--bg3);
      border-bottom: 1px solid var(--border);
      padding: 10px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .card-title {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--green);
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .card-body { padding: 14px; }
    .card-actions {
      padding: 10px 14px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    /* ── COLLAPSIBLE ── */
    .collapsible { }
    .collapsible-toggle {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      color: var(--green);
      font-family: var(--mono);
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      text-align: right;
      margin-bottom: 2px;
    }
    .collapsible-toggle:hover { border-color: var(--border2); background: var(--bg4); }
    .collapsible-toggle .arrow { transition: transform 0.2s; }
    .collapsible-content { display: none; }
    .collapsible-content.open { display: block; }
    .coll-open .arrow { transform: rotate(180deg); }

    /* ── TABLE ── */
    .tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
    .tbl th {
      background: var(--bg3);
      color: var(--green2);
      font-family: var(--mono);
      font-size: 11px;
      text-align: right;
      padding: 7px 10px;
      border-bottom: 2px solid var(--border2);
      white-space: nowrap;
    }
    .tbl td {
      padding: 8px 10px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    .tbl tr:last-child td { border-bottom: none; }
    .tbl tr:hover td { background: var(--bg3); }
    .tbl .mono { font-family: var(--mono); color: var(--green2); font-size: 12px; }
    .tbl .actions { display: flex; gap: 5px; flex-wrap: wrap; }

    /* ── FORM ── */
    .form-row { margin-bottom: 12px; }
    .form-label {
      display: block;
      color: var(--text2);
      font-size: 12px;
      font-family: var(--mono);
      margin-bottom: 4px;
    }
    .form-input, .form-select, .form-textarea {
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      padding: 7px 10px;
      font-family: var(--body);
      font-size: 13px;
      width: 100%;
      outline: none;
      transition: border-color 0.15s;
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 2px rgba(74,222,128,0.1);
    }
    .form-select option { background: var(--bg2); }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .form-inline { display: flex; gap: 8px; align-items: flex-end; }
    .form-inline .form-row { flex: 1; margin-bottom: 0; }

    /* ── BADGE ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 2px 8px;
      border-radius: 99px;
      font-size: 11px;
      font-family: var(--mono);
      font-weight: bold;
    }
    .badge-green { background: #052e16; color: var(--green); border: 1px solid var(--green-dim); }
    .badge-yellow { background: #451a03; color: var(--warn); border: 1px solid #92400e; }
    .badge-blue { background: #0c1a40; color: #60a5fa; border: 1px solid #1e3a8a; }
    .badge-muted { background: var(--bg3); color: var(--muted); border: 1px solid var(--border); }

    /* ── FLASH ── */
    .flash {
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 13px;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .flash-info { background: #052e16; border: 1px solid var(--green3); color: var(--text2); }
    .flash-error { background: var(--danger-bg); border: 1px solid #b91c1c; color: var(--danger); }

    /* ── DIVIDER ── */
    .divider { border: none; border-top: 1px solid var(--border); margin: 14px 0; }

    /* ── STAT BOX ── */
    .stat-box {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      text-align: center;
    }
    .stat-num { font-family: var(--mono); font-size: 28px; color: var(--green); line-height: 1; }
    .stat-label { font-size: 11px; color: var(--muted); margin-top: 4px; font-family: var(--mono); }

    /* ── EMPTY ── */
    .empty { text-align: center; padding: 30px; color: var(--muted); font-family: var(--mono); font-size: 13px; }
    .empty::before { content: '//'; margin-left: 5px; }

    /* ── SECTION HEADER ── */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .section-title {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* ── EXERCISE ROW card ── */
    .ex-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      gap: 10px;
    }
    .ex-row:last-child { border-bottom: none; }
    .ex-row:hover { background: var(--bg3); }
    .ex-info { flex: 1; min-width: 0; }
    .ex-title { font-weight: 600; font-size: 13px; color: var(--text); }
    .ex-meta { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-top: 2px; }
    .ex-btns { display: flex; gap: 5px; flex-shrink: 0; }

    /* ── LOGIN ── */
    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at center, #0d1f0d 0%, #060c06 100%);
    }
    .login-box {
      width: 380px;
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: var(--shadow), 0 0 60px rgba(34,197,94,0.06);
    }
    .login-head {
      background: var(--bg3);
      border-bottom: 2px solid var(--green3);
      padding: 24px;
      text-align: center;
    }
    .login-star { font-size: 36px; color: var(--green); }
    .login-title { font-family: var(--mono); font-size: 18px; color: var(--green); margin-top: 6px; }
    .login-sub { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-top: 4px; letter-spacing: 2px; }
    .login-body { padding: 24px; }
    .demo-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin-top: 10px; }
    .demo-item {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px;
      text-align: center;
    }
    .demo-role { font-family: var(--mono); font-size: 10px; color: var(--muted); }
    .demo-cred { font-family: var(--mono); font-size: 11px; color: var(--green2); margin-top: 3px; }

    .user-search-wrap { position: relative; flex: 1; min-width: 0; }
    .user-search-results {
      z-index: 50;
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      overflow-y: auto;
      box-shadow: var(--shadow);
    }
    .user-search-item {
      display: block;
      width: 100%;
      text-align: right;
      padding: 10px 12px;
      border: none;
      background: transparent;
      color: var(--text);
      cursor: pointer;
      font-family: var(--sans);
      font-size: 13px;
      border-bottom: 1px solid var(--border);
    }
    .user-search-item:hover,
    .user-search-item.active {
      background: var(--bg4);
      color: var(--green);
    }
    .user-search-item small {
      display: block;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      margin-top: 2px;
    }

    .team-matrix-tabs { display: flex; flex-wrap: wrap; gap: 8px; }
    .team-matrix-tab {
      padding: 8px 14px;
      border: 1px solid var(--border2);
      border-radius: 8px;
      background: var(--bg3);
      color: var(--text);
      font-family: var(--mono);
      font-size: 12px;
      cursor: pointer;
    }
    .team-matrix-tab.active {
      border-color: var(--green);
      background: var(--bg4);
      font-weight: bold;
    }
    .team-matrix-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }
    .team-matrix-stat {
      text-align: center;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg3);
    }
    .team-matrix-stat-num { font-size: 22px; font-weight: bold; font-family: var(--mono); }
    .team-matrix-stat-label { font-size: 11px; color: var(--muted); margin-top: 4px; }
    .team-matrix-scroll { overflow: auto; max-width: 100%; }
    .team-matrix-tbl { min-width: 600px; font-size: 12px; }
    .team-matrix-tbl th, .team-matrix-tbl td {
      vertical-align: top;
      min-width: 100px;
      max-width: 140px;
    }
    .team-matrix-sticky {
      position: sticky;
      right: 0;
      z-index: 2;
      background: var(--bg2);
      min-width: 160px;
      max-width: 200px;
      box-shadow: -4px 0 8px rgba(0,0,0,.15);
    }

<body>
<div id="page-loader">
  <div class="loader-ring"></div>
  <div class="loader-dots"><span></span><span></span><span></span></div>
  <div class="loader-text" id="loader-text">// LOADING...</div>
</div>

<div id="app-content"><?!= body ?></div>
<script>
  // ══ Page loader (shared by SPA + assign board) ══
  var MapimLoader = (function() {
    var loader = document.getElementById('page-loader');
    var ltxt = document.getElementById('loader-text');
    var msgTimer = null;
    var safetyTimer = null;
    var MSGS = ['// LOADING...', '// FETCHING DATA...', '// RENDERING...', '// ALMOST THERE...'];
    var LABELS = {
      'action=login': '// AUTHENTICATING...',
      'action=verifyMfa': '// VERIFYING CODE...',
      'action=resendMfa': '// RESENDING CODE...',
      'action=logout': '// SIGNING OUT...',
      'action=delete': '// DELETING...',
      'action=create': '// CREATING...',
      'action=edit': '// SAVING...',
      'action=assign': '// ASSIGNING...',
      'action=remove': '// REMOVING...',
      'action=complete': '// UPDATING...',
      'action=autoAssignAll': '// AUTO-ASSIGNING...',
      'action=clearAllAssignments': '// CLEARING...',
      'action=importUsers': '// IMPORTING...',
      'page=dashboard': '// LOADING DASHBOARD...',
      'page=exercise': '// LOADING EXERCISE...',
      'page=timeline': '// LOADING TIMELINE...',
      'page=assign': '// LOADING BOARD...',
      'page=user': '// LOADING PROFILE...',
      'page=users': '// LOADING USERS...',
      'page=exercises': '// LOADING EXERCISES...',
      'page=fieldForces': '// LOADING FIELD FORCES...',
      'page=fieldForce': '// LOADING...',
      'page=fireZones': '// LOADING FIRE ZONES...',
      'page=fireZone': '// LOADING...',
      'page=teamMatrix': '// LOADING TEAM VIEW...',
      'page=exerciseMatrix': '// LOADING EXERCISE VIEW...',
      'page=statistics': '// LOADING STATISTICS...',
      'page=feedback': '// LOADING FEEDBACK...'
    };
    function labelFor(key) {
      if (!key) return MSGS[0];
      for (var k in LABELS) { if (key.indexOf(k) > -1) return LABELS[k]; }
      return MSGS[0];
    }
    function show(msg) {
      if (!loader) return;
      clearInterval(msgTimer);
      clearTimeout(safetyTimer);
      loader.classList.add('visible');
      var text = msg || MSGS[0];
      if (ltxt) ltxt.textContent = text;
      var i = 0;
      msgTimer = setInterval(function() {
        if (!ltxt) return;
        i = (i + 1) % MSGS.length;
        ltxt.textContent = MSGS[i];
      }, 900);
      safetyTimer = setTimeout(hide, 20000);
    }
    function hide() {
      if (!loader) return;
      clearInterval(msgTimer);
      clearTimeout(safetyTimer);
      loader.classList.remove('visible');
    }
    return { show: show, hide: hide, labelFor: labelFor, MSGS: MSGS };
  })();
  window.MapimSpaShowLoader = function(msg) { MapimLoader.show(msg); };
  window.MapimSpaHideLoader = function() { MapimLoader.hide(); };

  // ══ SPA router — fixed URL, no full page reloads ══
  var MapimSpa = (function() {
    var SID_KEY = 'mapim_sid';
    var MFA_KEY = 'mapim_mfa_token';
    var loading = false;
    var reqId = 0;

    function parseSpaParams(el) {
      var raw = el.getAttribute('data-spa-params');
      if (!raw) return {};
      try { return JSON.parse(raw); } catch (e1) {
        try {
          var t = document.createElement('textarea');
          t.innerHTML = raw;
          return JSON.parse(t.value);
        } catch (e2) { return {}; }
      }
    }

    function getSid() {
      try { return sessionStorage.getItem(SID_KEY) || ''; } catch (e) { return ''; }
    }
    function setSid(sid) {
      try {
        if (sid) sessionStorage.setItem(SID_KEY, sid);
        else sessionStorage.removeItem(SID_KEY);
      } catch (e) {}
    }

    function setMfaToken(token) {
      try {
        if (token) sessionStorage.setItem(MFA_KEY, token);
        else sessionStorage.removeItem(MFA_KEY);
      } catch (e) {}
    }
    function getMfaToken() {
      try { return sessionStorage.getItem(MFA_KEY) || ''; } catch (e) { return ''; }
    }

    function runScripts(container) {
      if (!container) return;
      container.querySelectorAll('script').forEach(function(old) {
        var t = (old.getAttribute('type') || '').trim().toLowerCase();
        // Keep data islands (e.g. assign board JSON) — do not execute as JS
        if (t && t !== 'text/javascript' && t !== 'application/javascript' && t !== 'module') {
          return;
        }
        var s = document.createElement('script');
        if (old.src) {
          s.src = old.src;
          s.async = false;
        } else {
          s.textContent = old.textContent;
        }
        old.parentNode.replaceChild(s, old);
      });
    }

    function initFlatpickr() {
      if (typeof flatpickr === 'undefined') return;
      document.querySelectorAll('.datepicker').forEach(function(el) {
        if (el._flatpickr) return;
        flatpickr(el, { dateFormat: 'Y-m-d', allowInput: true, disableMobile: true });
      });
    }

    function afterRender() {
      if (typeof initCollapsibles === 'function') initCollapsibles();
      if (typeof initDatePickers === 'function') initDatePickers();
      initFlatpickr();
      initAppDrawer();
      if (typeof initTimelineWeek === 'function') initTimelineWeek();
      if (typeof initDashboardUserSearch === 'function') initDashboardUserSearch();

    function initAppDrawer() {
      var drawer = document.getElementById('appDrawer');
      var overlay = document.getElementById('appDrawerOverlay');
      var openBtn = document.getElementById('appDrawerOpen');
      var closeBtn = document.getElementById('appDrawerClose');
      if (!drawer || !overlay) return;

      function openDrawer() {
        drawer.classList.add('open');
        drawer.setAttribute('aria-hidden', 'false');
        overlay.hidden = false;
        requestAnimationFrame(function() {
          overlay.classList.add('open');
        });
        document.body.classList.add('drawer-open');
      }

      function closeDrawer() {
        drawer.classList.remove('open');
        drawer.setAttribute('aria-hidden', 'true');
        overlay.classList.remove('open');
        document.body.classList.remove('drawer-open');
        setTimeout(function() {
          if (!drawer.classList.contains('open')) overlay.hidden = true;
        }, 280);
      }

      if (openBtn) {
        openBtn.onclick = function(e) {
          e.preventDefault();
          openDrawer();
        };
      }
      if (closeBtn) {
        closeBtn.onclick = function(e) {
          e.preventDefault();
          closeDrawer();
        };
      }
      overlay.onclick = closeDrawer;

      drawer.querySelectorAll('.app-drawer-link, .app-drawer-foot a').forEach(function(el) {
        el.addEventListener('click', function() {
          closeDrawer();
        });
      });

      window.MapimDrawer = { open: openDrawer, close: closeDrawer };
    }

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' && window.MapimDrawer) MapimDrawer.close();
    });

    function applyResult(result) {
      if (!result) return;
      if (result.clearSid) {
        setSid('');
        setMfaToken('');
      }
      if (result.sid) {
        setSid(result.sid);
        setMfaToken('');
      }
      if (result.mfaToken) setMfaToken(result.mfaToken);
      var app = document.getElementById('app-content');
      if (app && result.body != null) {
        app.innerHTML = result.body;
        runScripts(app);
        afterRender();
      }
      if (result.title) document.title = result.title;
      MapimLoader.hide();
      loading = false;
    }

    function fail(err) {
      MapimLoader.hide();
      loading = false;
      alert(err && err.message ? err.message : String(err));
    }

    function navigate(page, params) {
      var myReq = ++reqId;
      loading = true;
      MapimLoader.show(MapimLoader.labelFor('page=' + (page || '')));
      google.script.run
        .withSuccessHandler(function(result) {
          if (myReq !== reqId) return;
          applyResult(result);
        })
        .withFailureHandler(function(err) {
          if (myReq !== reqId) return;
          fail(err);
        })
        .apiRenderPage(getSid(), page, JSON.stringify(params || {}));
    }

    function runAction(action, params) {
      var myReq = ++reqId;
      loading = true;
      MapimLoader.show(MapimLoader.labelFor('action=' + (action || '')));
      google.script.run
        .withSuccessHandler(function(result) {
          if (myReq !== reqId) return;
          applyResult(result);
        })
        .withFailureHandler(function(err) {
          if (myReq !== reqId) return;
          fail(err);
        })
        .apiRunAction(getSid(), action, JSON.stringify(params || {}));
    }

    function formToObject(form) {
      var data = {};
      var fd = new FormData(form);
      fd.forEach(function(v, k) { data[k] = v; });
      // Include inputs linked via form="..." (participant row save)
      if (form.id) {
        document.querySelectorAll('[form="' + form.id + '"]').forEach(function(el) {
          if (!el.name || el.disabled) return;
          if (el.type === 'checkbox' || el.type === 'radio') {
            if (el.checked) data[el.name] = el.value;
            return;
          }
          data[el.name] = el.value;
        });
      }
      return data;
    }

    function boot() {
      MapimLoader.show('// LOADING...');
      var sid = getSid();
      navigate(sid ? 'dashboard' : 'login', {});
    }

    function isLocalUiClick(el) {
      return el.closest('.collapsible-toggle') ||
        el.closest('.dp-tab') ||
        el.closest('.dp-wrap') ||
        el.closest('.dp-popup') ||
        el.closest('#page-loader') ||
        el.closest('#timelineWeekSelect') ||
        el.closest('#timelineEditToggle') ||
        el.closest('.tl-bar') ||
        el.closest('.tl-handle');
    }

    document.addEventListener('click', function(e) {
      if (isLocalUiClick(e.target)) return;

      var el = e.target.closest('[data-spa-page]');
      if (el) {
        e.preventDefault();
        navigate(el.getAttribute('data-spa-page'), parseSpaParams(el));
        return;
      }
      el = e.target.closest('[data-spa-action]');
      if (el && !el.dataset.confirm) {
        e.preventDefault();
        runAction(el.getAttribute('data-spa-action'), parseSpaParams(el));
        return;
      }
      if (e.target.closest('.spa-form button[type="submit"], .spa-form input[type="submit"], button[type="submit"][form]')) {
        MapimLoader.show('// SAVING...');
      }
      if (e.target.id === 'xlsxImportBtn' || e.target.closest('#xlsxImportBtn')) {
        MapimLoader.show('// IMPORTING...');
      }
    }, true);

    document.addEventListener('submit', function(e) {
      var form = e.target;
      if (!form || !form.classList || !form.classList.contains('spa-form')) return;
      e.preventDefault();
      var data = formToObject(form);
      var action = data.action;
      delete data.action;
      delete data.sid;
      if (!data.mfaToken) {
        var storedMfa = getMfaToken();
        if (storedMfa) data.mfaToken = storedMfa;
      }
      if (!action) return;
      runAction(action, data);
    }, true);

    return {
      navigate: navigate, runAction: runAction, getSid: getSid, setSid: setSid,
      boot: boot, applyResult: applyResult, showLoader: MapimLoader.show, hideLoader: MapimLoader.hide
    };
  })();

  function initDashboardUserSearch() {
    var input = document.getElementById('dashboardUserSearch');
    var results = document.getElementById('dashboardUserSearchResults');
    var btn = document.getElementById('dashboardUserSearchBtn');
    if (!input || !results) return;

    var users = [];
    try {
      users = JSON.parse(input.getAttribute('data-users') || '[]');
    } catch (e) {
      users = [];
    }

    var selectedId = input.getAttribute('data-selected-id') || '';
    if (selectedId) input.dataset.selectedUserId = selectedId;

    var activeIdx = -1;

    function hideResults() {
      results.hidden = true;
      results.innerHTML = '';
      activeIdx = -1;
    }

    function selectUser(id, label) {
      if (!id) return;
      input.dataset.selectedUserId = id;
      if (label) input.value = label;
      hideResults();
    }

    function resolveUserId() {
      var userId = input.dataset.selectedUserId || '';
      if (userId) return userId;
      var q = String(input.value || '').trim().toLowerCase();
      if (!q) return '';
      var exact = users.find(function(u) {
        return String(u.id || '').toLowerCase() === q ||
          String(u.name || '').toLowerCase() === q;
      });
      if (exact) return exact.id;
      var matches = users.filter(function(u) {
        return String(u.id || '').toLowerCase().indexOf(q) !== -1 ||
          String(u.name || '').toLowerCase().indexOf(q) !== -1;
      });
      if (matches.length === 1) return matches[0].id;
      return '';
    }

    function runUserExerciseSearch() {
      var userId = resolveUserId();
      if (!userId) {
        alert('בחר משתמש מהרשימה או הזן שם / מספר אישי מדויק');
        return;
      }
      if (!window.MapimSpa) return;
      MapimSpa.navigate('dashboard', { searchUserId: userId });
    }

    function renderMatches(q) {
      var query = String(q || '').trim().toLowerCase();
      input.dataset.selectedUserId = '';
      if (!query) {
        hideResults();
        return;
      }
      var matches = users.filter(function(u) {
        return String(u.id || '').toLowerCase().indexOf(query) !== -1 ||
          String(u.name || '').toLowerCase().indexOf(query) !== -1;
      }).slice(0, 10);

      if (!matches.length) {
        results.innerHTML = '<div style="padding:10px 12px;color:var(--muted);font-size:12px">לא נמצאו משתמשים</div>';
        results.hidden = false;
        return;
      }

      results.innerHTML = matches.map(function(u, i) {
        return '<button type="button" class="user-search-item' + (i === activeIdx ? ' active' : '') + '" data-user-id="' +
          String(u.id).replace(/"/g, '&quot;') + '" data-user-label="' +
          String(u.name + ' (' + u.id + ')').replace(/"/g, '&quot;') + '">' +
          '<span>' + String(u.name).replace(/</g, '&lt;') + '</span>' +
          '<small>' + String(u.id).replace(/</g, '&lt;') + ' · ' + String(u.role || '').replace(/</g, '&lt;') + '</small>' +
          '</button>';
      }).join('');
      results.hidden = false;

      results.querySelectorAll('.user-search-item').forEach(function(el) {
        el.addEventListener('mousedown', function(e) {
          e.preventDefault();
          selectUser(el.getAttribute('data-user-id'), el.getAttribute('data-user-label'));
        });
      });
    }

    if (!input._searchBound) {
      input._searchBound = true;
      input.addEventListener('input', function() {
        activeIdx = -1;
        renderMatches(input.value);
      });
      input.addEventListener('keydown', function(e) {
        var items = results.querySelectorAll('.user-search-item');
        if (e.key === 'ArrowDown') {
          e.preventDefault();
          if (results.hidden) renderMatches(input.value);
          items = results.querySelectorAll('.user-search-item');
          activeIdx = Math.min(activeIdx + 1, items.length - 1);
          items.forEach(function(el, i) { el.classList.toggle('active', i === activeIdx); });
        } else if (e.key === 'ArrowUp') {
          e.preventDefault();
          activeIdx = Math.max(activeIdx - 1, 0);
          items.forEach(function(el, i) { el.classList.toggle('active', i === activeIdx); });
        } else if (e.key === 'Enter') {
          if (!results.hidden && activeIdx >= 0 && items[activeIdx]) {
            e.preventDefault();
            selectUser(items[activeIdx].getAttribute('data-user-id'), items[activeIdx].getAttribute('data-user-label'));
          } else if (!results.hidden && items.length === 1) {
            e.preventDefault();
            selectUser(items[0].getAttribute('data-user-id'), items[0].getAttribute('data-user-label'));
          } else {
            e.preventDefault();
            runUserExerciseSearch();
          }
        } else if (e.key === 'Escape') {
          hideResults();
        }
      });
      document.addEventListener('click', function(e) {
        if (!e.target.closest('.dashboard-search-panel')) hideResults();
      });
    }

    if (btn && !btn._searchBound) {
      btn._searchBound = true;
      btn.addEventListener('click', runUserExerciseSearch);
    }
  }

  // ── Hebrew Date Picker ──
  const HEB_MONTHS = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
  const HEB_DAYS_SHORT = ['א','ב','ג','ד','ה','ו','ש']; // Sun..Sat

  function initDatePickers() {
    document.querySelectorAll('.dp-wrap').forEach(wrap => {
      const hidden  = wrap.querySelector('input[type=hidden]');
      const trigger = wrap.querySelector('.dp-trigger');
      const popup   = wrap.querySelector('.dp-popup');
      const valSpan = trigger.querySelector('.dp-val');

      let cur = new Date();
      cur.setDate(1);
      let selectedDate = null;
      let yearMode = false;

      // Parse existing value
      if (hidden.value) {
        const parts = hidden.value.split('-');
        if (parts.length === 3) {
          selectedDate = new Date(+parts[0], +parts[1]-1, +parts[2]);
          cur = new Date(selectedDate.getFullYear(), selectedDate.getMonth(), 1);
          updateTriggerLabel();
        }
      }

      function updateTriggerLabel() {
        if (selectedDate) {
          const d = selectedDate;
          const days = ['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
          valSpan.innerHTML = '<span>' + days[d.getDay()] + ', ' + d.getDate() + ' ב' + HEB_MONTHS[d.getMonth()] + ' ' + d.getFullYear() + '</span>';
        } else {
          valSpan.innerHTML = '<span class="dp-placeholder">בחר תאריך...</span>';
        }
      }

      function renderCalendar() {
        if (yearMode) { renderYearGrid(); return; }
        const year = cur.getFullYear(), month = cur.getMonth();
        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month+1, 0).getDate();
        const today = new Date();

        let html = '<div class="dp-header">' +
          '<button type="button" class="dp-nav" data-action="prev">&#8250;</button>' +
          '<span class="dp-month-label" data-action="year-mode">' + HEB_MONTHS[month] + ' ' + year + '</span>' +
          '<button type="button" class="dp-nav" data-action="next">&#8249;</button>' +
          '</div><div class="dp-grid">';
        HEB_DAYS_SHORT.forEach(d => { html += '<div class="dp-dow">' + d + '</div>'; });
        // empty cells before first day
        for (let i = 0; i < firstDay; i++) html += '<div class="dp-day empty"></div>';
        for (let d = 1; d <= daysInMonth; d++) {
          const isToday = (d === today.getDate() && month === today.getMonth() && year === today.getFullYear());
          const isSel = selectedDate && (d === selectedDate.getDate() && month === selectedDate.getMonth() && year === selectedDate.getFullYear());
          html += '<div class="dp-day' + (isToday?' today':'') + (isSel?' selected':'') + '" data-day="' + d + '">' + d + '</div>';
        }
        html += '</div>';
        popup.innerHTML = html;
        popup.querySelectorAll('[data-action]').forEach(el => {
          el.addEventListener('click', e => { e.stopPropagation(); handleNav(el.dataset.action); });
        });
        popup.querySelectorAll('[data-day]').forEach(el => {
          el.addEventListener('click', e => { e.stopPropagation(); selectDay(+el.dataset.day); });
        });
      }

      function renderYearGrid() {
        const selYear = cur.getFullYear();
        const start = selYear - 6;
        let html = '<div class="dp-header">' +
          '<button type="button" class="dp-nav" data-action="year-prev">&#8250;</button>' +
          '<span style="font-family:var(--mono);font-size:13px;color:var(--text2)">בחר שנה</span>' +
          '<button type="button" class="dp-nav" data-action="year-next">&#8249;</button>' +
          '</div><div class="dp-year-grid">';
        for (let y = start; y < start+12; y++) {
          html += '<div class="dp-year-btn' + (y===selYear?' selected':'') + '" data-year="'+y+'">'+y+'</div>';
        }
        html += '</div>';
        popup.innerHTML = html;
        popup.querySelectorAll('[data-action]').forEach(el => {
          el.addEventListener('click', e => { e.stopPropagation(); handleNav(el.dataset.action); });
        });
        popup.querySelectorAll('[data-year]').forEach(el => {
          el.addEventListener('click', e => { e.stopPropagation(); cur.setFullYear(+el.dataset.year); yearMode=false; renderCalendar(); });
        });
      }

      function handleNav(action) {
        if (action === 'prev') { cur.setMonth(cur.getMonth()-1); renderCalendar(); }
        else if (action === 'next') { cur.setMonth(cur.getMonth()+1); renderCalendar(); }
        else if (action === 'year-mode') { yearMode = true; renderCalendar(); }
        else if (action === 'year-prev') { cur.setFullYear(cur.getFullYear()-12); renderCalendar(); }
        else if (action === 'year-next') { cur.setFullYear(cur.getFullYear()+12); renderCalendar(); }
      }

      function selectDay(day) {
        selectedDate = new Date(cur.getFullYear(), cur.getMonth(), day);
        const y = selectedDate.getFullYear();
        const m = String(selectedDate.getMonth()+1).padStart(2,'0');
        const d = String(selectedDate.getDate()).padStart(2,'0');
        hidden.value = y + '-' + m + '-' + d;
        updateTriggerLabel();
        popup.classList.remove('open');
        trigger.classList.remove('open');
      }

      trigger.addEventListener('click', e => {
        e.stopPropagation();
        const isOpen = popup.classList.toggle('open');
        trigger.classList.toggle('open', isOpen);
        if (isOpen) {
          yearMode = false;
          renderCalendar();
          // Smart positioning: place popup below trigger, flip if not enough room
          const rect = trigger.getBoundingClientRect();
          const popW = 272, popH = 280;
          let top = rect.bottom + 4;
          let left = rect.right - popW;
          // Flip above if not enough room below
          if (top + popH > window.innerHeight - 10) top = rect.top - popH - 4;
          // Keep within left edge
          if (left < 8) left = 8;
          // Keep within right edge
          if (left + popW > window.innerWidth - 8) left = window.innerWidth - popW - 8;
          popup.style.top = top + 'px';
          popup.style.left = left + 'px';
        }
      });

      document.addEventListener('click', () => {
        popup.classList.remove('open');
        trigger.classList.remove('open');
      });
      window.addEventListener('resize', () => {
        popup.classList.remove('open');
        trigger.classList.remove('open');
      });
      popup.addEventListener('click', e => e.stopPropagation());
    });
  }

  // ══ Hebrew-safe CSV importer ══
  (function(){

    // Read file as ArrayBuffer, detect encoding from BOM and byte content,
    // then decode correctly — handles UTF-8, UTF-8 BOM, and Windows-1255 (Hebrew Excel)
    function readFileHebrew(file, cb) {
      var reader = new FileReader();
      reader.onload = function(e) {
        var buf = e.target.result;
        var bytes = new Uint8Array(buf);

        // Check for UTF-8 BOM (EF BB BF)
        if (bytes[0] === 0xEF && bytes[1] === 0xBB && bytes[2] === 0xBF) {
          cb(new TextDecoder('utf-8').decode(buf.slice(3)));
          return;
        }

        // Check for UTF-16 LE BOM (FF FE)
        if (bytes[0] === 0xFF && bytes[1] === 0xFE) {
          cb(new TextDecoder('utf-16le').decode(buf.slice(2)));
          return;
        }

        // Try UTF-8 first
        try {
          var utfText = new TextDecoder('utf-8', { fatal: true }).decode(buf);
          // Valid UTF-8 — check if Hebrew chars are present (U+05D0–U+05EA range)
          // If so, great. If text looks like question marks, fall through.
          cb(utfText);
        } catch(e) {
          // Not valid UTF-8 — must be Windows-1255 (Hebrew Excel default)
          try {
            cb(new TextDecoder('windows-1255').decode(buf));
          } catch(e2) {
            // Last resort: ISO-8859-8 (Hebrew)
            cb(new TextDecoder('iso-8859-8').decode(buf));
          }
        }
      };
      reader.onerror = function() { cb(''); };
      reader.readAsArrayBuffer(file);
    }

    function parseCSVorTSV(text) {
      text = text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').trim();
      if (!text) throw new Error('הקובץ ריק.');
      var lines = text.split('\n').filter(function(l){return l.trim();});
      if (lines.length < 2) throw new Error('נדרשת שורת כותרת + לפחות שורת נתונים.');

      // Auto-detect delimiter
      var delim = lines[0].indexOf('\t') > -1 ? '\t' : ',';

      var headers = splitLine(lines[0], delim).map(function(h){
        return h.trim().toLowerCase().replace(/^"|"$/g,'').replace(/^\uFEFF/,'');
      });

      var req = ['id','name','password'];
      var miss = req.filter(function(r){return headers.indexOf(r) < 0;});
      if (miss.length) throw new Error('חסרות עמודות: ' + miss.join(', ') + '\nעמודות שנמצאו: ' + headers.join(', '));

      return lines.slice(1).map(function(line) {
        var vals = splitLine(line, delim);
        var obj  = {};
        headers.forEach(function(h,i){ obj[h] = (vals[i]||'').trim().replace(/^"|"$/g,''); });
        return obj;
      }).filter(function(r){ return r.id; });
    }

    function splitLine(line, delim) {
      if (delim === '\t') return line.split('\t');
      var res=[], cur='', inQ=false;
      for (var i=0; i<line.length; i++) {
        var ch=line[i];
        if (ch==='"'){inQ=!inQ;continue;}
        if (ch===delim&&!inQ){res.push(cur);cur='';continue;}
        cur+=ch;
      }
      res.push(cur);
      return res;
    }

    function showPreview(rows, previewTbl, preview, importBtn, errDiv) {
      if (!rows.length) { showErr(errDiv,'לא נמצאו שורות תקינות.'); return; }
      var cols=['id','name','password','role','team_id'];
      var tbl='<table class="tbl" style="font-size:11px"><thead><tr>'+
        cols.map(function(c){return '<th>'+c+'</th>';}).join('')+
        '</tr></thead><tbody>';
      rows.slice(0,8).forEach(function(row){
        tbl+='<tr>'+cols.map(function(col){
          var val=row[col]||'';
          return '<td>'+(col==='password'?'••••':val)+'</td>';
        }).join('')+'</tr>';
      });
      if(rows.length>8) tbl+='<tr><td colspan="'+cols.length+'" style="color:var(--muted);text-align:center;font-family:var(--mono);font-size:11px">… ועוד '+(rows.length-8)+' שורות</td></tr>';
      tbl+='</tbody></table>';
      tbl+='<div style="font-family:var(--mono);font-size:11px;color:var(--green);margin-top:8px">✓ '+rows.length+' משתמשים לייבוא</div>';
      previewTbl.innerHTML = tbl;
      preview.style.display   = 'block';
      importBtn.style.display = 'inline-block';
      importBtn._rows = rows;
    }

    function showErr(errDiv, msg) {
      errDiv.textContent   = '⚠ ' + msg;
      errDiv.style.display = 'block';
    }

    function onFileChange(input) {
      var preview    = document.getElementById('xlsxPreview');
      var previewTbl = document.getElementById('xlsxPreviewTable');
      var errDiv     = document.getElementById('xlsxError');
      var importBtn  = document.getElementById('xlsxImportBtn');
      if (!preview) return;
      errDiv.style.display    = 'none';
      preview.style.display   = 'none';
      importBtn.style.display = 'none';
      importBtn._rows         = null;
      var file = input.files && input.files[0];
      if (!file) return;

      readFileHebrew(file, function(text) {
        try {
          var rows = parseCSVorTSV(text);
          showPreview(rows, previewTbl, preview, importBtn, errDiv);
        } catch(err) {
          showErr(errDiv, err.message);
        }
      });
    }

    window.doXlsxImport = function() {
      var btn  = document.getElementById('xlsxImportBtn');
      var rows = btn && btn._rows;
      if (!rows || !rows.length) return;
      btn.textContent = '⏳ מייבא...';
      btn.disabled    = true;
      MapimLoader.show('// IMPORTING...');
      var payload = rows.map(function(r){
        return {id:r.id||'',name:r.name||'',password:r.password||'',
                role:r.role||'trainee',team_id:r.team_id||''};
      });
      MapimSpa.runAction('importUsers', { usersJson: JSON.stringify(payload) });
    };

    document.addEventListener('change', function(e){
      if (e.target && e.target.id === 'xlsxFile') onFileChange(e.target);
    });
  })();

  function initTimelineWeek() {
    var weekSel = document.getElementById('timelineWeekSelect');
    if (weekSel && !weekSel._bound) {
      weekSel._bound = true;
      weekSel.addEventListener('change', function() {
        if (!window.MapimSpa) return;
        MapimSpa.navigate('timeline', { week: parseInt(weekSel.value, 10) || 0 });
      });
    }

    var track = document.getElementById('timelineTrack');
    var editBtn = document.getElementById('timelineEditToggle');
    var hint = document.getElementById('timelineEditHint');
    if (!track) return;
    if (track.getAttribute('data-can-edit') !== '1') return;

    function activeScroll() {
      return document.getElementById('timelineScroll');
    }

    function trackFullWidth(tr) {
      return tr.offsetWidth || tr.getBoundingClientRect().width;
    }

    var MIN_MS = 30 * 60 * 1000;
    var drag = null;

    function weekMs() {
      return (+track.dataset.weekEnd) - (+track.dataset.weekStart);
    }

    function getBarByExerciseId(exerciseId) {
      if (!exerciseId) return null;
      var domId = 'tl-bar-' + String(exerciseId).replace(/[^a-zA-Z0-9_-]/g, '_');
      var bar = document.getElementById(domId);
      return bar && track.contains(bar) ? bar : null;
    }

    function clampRange(startMs, endMs) {
      var ws = +track.dataset.weekStart;
      var we = +track.dataset.weekEnd;
      if (endMs - startMs < MIN_MS) endMs = startMs + MIN_MS;
      if (startMs < ws) {
        endMs += ws - startMs;
        startMs = ws;
      }
      if (endMs > we) {
        startMs -= endMs - we;
        endMs = we;
      }
      if (endMs - startMs < MIN_MS) return null;
      return { startMs: startMs, endMs: endMs };
    }

    function msToParts(ms) {
      var d = new Date(ms);
      var y = d.getFullYear();
      var m = String(d.getMonth() + 1).padStart(2, '0');
      var dd = String(d.getDate()).padStart(2, '0');
      return {
        date: y + '-' + m + '-' + dd,
        time: String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0')
      };
    }

    function applyBar(bar, startMs, endMs) {
      if (!bar) return;
      var w = weekMs();
      var ws = +track.dataset.weekStart;
      var rightPct = ((startMs - ws) / w) * 100;
      var widthPct = ((endMs - startMs) / w) * 100;
      bar.style.right = rightPct + '%';
      bar.style.width = Math.max(widthPct, 1.5) + '%';
      bar.dataset.startMs = String(startMs);
      bar.dataset.endMs = String(endMs);
    }

    function pointerToMs(clientX) {
      var fullW = trackFullWidth(track);
      var fromRight;
      var sc = activeScroll();
      if (sc) {
        var sr = sc.getBoundingClientRect();
        fromRight = (sr.right - clientX) + sc.scrollLeft;
      } else {
        var box = track.getBoundingClientRect();
        fromRight = box.right - clientX;
      }
      var pct = Math.max(0, Math.min(1, fromRight / fullW));
      return +track.dataset.weekStart + pct * weekMs();
    }

    function showTimelineFlash(msg) {
      var card = document.getElementById('timelineWeekCard');
      if (!card) return;
      var el = card.querySelector('.timeline-save-flash');
      if (!el) {
        el = document.createElement('div');
        el.className = 'timeline-save-flash flash flash-info';
        el.style.margin = '0';
        el.style.borderRadius = '0';
        el.style.border = 'none';
        el.style.borderBottom = '1px solid var(--border)';
        card.insertBefore(el, card.firstChild.nextSibling);
      }
      el.textContent = '✓ ' + msg;
      el.style.display = 'block';
    }

    function saveBar(exerciseId, origStart, origEnd) {
      var bar = getBarByExerciseId(exerciseId);
      if (!bar) return;
      var startMs = +bar.dataset.startMs;
      var endMs = +bar.dataset.endMs;
      if (startMs === origStart && endMs === origEnd) return;

      var s = msToParts(startMs);
      var e = msToParts(endMs);
      bar.classList.add('tl-saving');
      MapimSpa.showLoader('// SAVING...');
      google.script.run
        .withSuccessHandler(function(result) {
          bar.classList.remove('tl-saving');
          MapimSpa.hideLoader();
          bar.setAttribute('data-orig-start', String(startMs));
          bar.setAttribute('data-orig-end', String(endMs));
          if (result && result.info) showTimelineFlash(result.info);
        })
        .withFailureHandler(function(err) {
          bar.classList.remove('tl-saving');
          MapimSpa.hideLoader();
          applyBar(bar, origStart, origEnd);
          alert(err && err.message ? err.message : String(err));
        })
        .apiUpdateExerciseTimes(
          MapimSpa.getSid(),
          exerciseId,
          s.date, s.time, e.date, e.time,
          track.dataset.weekOffset || '0'
        );
    }

    function onPointerMove(e) {
      if (!drag) return;
      e.preventDefault();
      var bar = getBarByExerciseId(drag.exerciseId);
      if (!bar) return;
      var deltaMs = -((e.clientX - drag.startX) / trackFullWidth(track)) * weekMs();
      var startMs = drag.origStart;
      var endMs = drag.origEnd;

      if (drag.mode === 'move') {
        startMs += deltaMs;
        endMs += deltaMs;
      } else if (drag.mode === 'resizeStart') {
        startMs = pointerToMs(e.clientX);
      } else if (drag.mode === 'resizeEnd') {
        endMs = pointerToMs(e.clientX);
      }

      var clamped = clampRange(startMs, endMs);
      if (clamped) applyBar(bar, clamped.startMs, clamped.endMs);
    }

    function endDrag(e) {
      if (!drag) return;
      var d = drag;
      drag = null;
      document.removeEventListener('pointermove', onPointerMove);
      document.removeEventListener('pointerup', endDrag);
      document.removeEventListener('pointercancel', endDrag);

      var bar = getBarByExerciseId(d.exerciseId);
      if (bar) bar.classList.remove('is-dragging');
      try {
        if (bar) bar.releasePointerCapture(e.pointerId);
      } catch (err) { /* ignore */ }
      saveBar(d.exerciseId, d.origStart, d.origEnd);
    }

    function refreshTimelineWeekTable() {
      var tbody = document.getElementById('timelineWeekTableBody');
      if (!tbody || !track) return;
      var sidQ = track.getAttribute('data-sid-q') || '';
      var bars = Array.prototype.slice.call(track.querySelectorAll('.tl-bar'));
      bars.sort(function(a, b) {
        var la = parseInt(a.getAttribute('data-lane') || '9', 10);
        var lb = parseInt(b.getAttribute('data-lane') || '9', 10);
        if (la !== lb) return la - lb;
        return (+a.dataset.startMs) - (+b.dataset.startMs);
      });
      if (!bars.length) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--muted);padding:16px">אין תרגילים בשבוע זה</td></tr>';
        return;
      }
      var typeBadge = function(t) {
        var c = t === 'חיר' ? 'green' : t === 'חשן' ? 'blue' : t === '900' ? 'yellow' : 'muted';
        return '<span class="badge badge-' + c + '">' + t + '</span>';
      };
      tbody.innerHTML = bars.map(function(bar) {
        var s = msToParts(+bar.dataset.startMs);
        var e = msToParts(+bar.dataset.endMs);
        var titleEl = bar.querySelector('.tl-bar-label');
        var title = titleEl ? titleEl.textContent : '';
        var exId = bar.getAttribute('data-exercise-id') || '';
        var typeKey = bar.getAttribute('data-exercise-type') || '';
        var open = '<a href="#" data-spa-page="exercise" data-spa-params="' +
          JSON.stringify({ id: exId }).replace(/"/g, '&quot;') +
          '" class="btn btn-secondary btn-sm">↗</a>';
        return '<tr data-exercise-id="' + exId + '">' +
          '<td>' + typeBadge(typeKey) + '</td>' +
          '<td><b>' + title + '</b></td>' +
          '<td class="mono">' + s.date + '</td>' +
          '<td class="mono">' + s.time + '</td>' +
          '<td class="mono">' + e.date + '</td>' +
          '<td class="mono">' + e.time + '</td>' +
          '<td>' + open + '</td></tr>';
      }).join('');
    }

    if (editBtn && !editBtn._bound) {
      editBtn._bound = true;
      editBtn.addEventListener('click', function() {
        var on = track.classList.toggle('edit-mode');
        editBtn.classList.toggle('active', on);
        editBtn.textContent = on ? '✓ יציאה מעריכה' : '✏ מצב עריכה';
        if (hint) hint.style.display = on ? 'block' : 'none';
        if (!on) refreshTimelineWeekTable();
      });
    }

    if (track._tlBound) return;
    track._tlBound = true;

    track.addEventListener('pointerdown', function(e) {
      if (!track.classList.contains('edit-mode')) return;
      var bar = e.target.closest('.tl-bar');
      if (!bar || !bar.dataset.exerciseId) return;
      if (!track.contains(bar)) return;
      e.preventDefault();
      e.stopPropagation();

      var exerciseId = bar.getAttribute('data-exercise-id');
      var mode = 'move';
      if (e.target.classList.contains('tl-handle-start')) mode = 'resizeStart';
      else if (e.target.classList.contains('tl-handle-end')) mode = 'resizeEnd';

      drag = {
        exerciseId: exerciseId,
        mode: mode,
        startX: e.clientX,
        origStart: +bar.dataset.startMs,
        origEnd: +bar.dataset.endMs
      };
      bar.setAttribute('data-orig-start', String(drag.origStart));
      bar.setAttribute('data-orig-end', String(drag.origEnd));
      bar.classList.add('is-dragging');
      bar.setPointerCapture(e.pointerId);

      document.addEventListener('pointermove', onPointerMove);
      document.addEventListener('pointerup', endDrag);
      document.addEventListener('pointercancel', endDrag);
    });
  }

  MapimSpa.boot();

</script>
