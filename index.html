<!doctype html>
<html lang="he" dir="rtl">
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title><?= pageTitle ?></title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Heebo:wght@300;400;600;700;900&display=swap');

    :root {
      --bg:        #0b0f0b;
      --bg2:       #111811;
      --bg3:       #172017;
      --bg4:       #1e2b1e;
      --border:    #2a4a2a;
      --border2:   #3a6a3a;
      --green:     #4ade80;
      --green2:    #22c55e;
      --green3:    #16a34a;
      --green-dim: #2d5a3d;
      --text:      #d1fae5;
      --text2:     #86efac;
      --text3:     #6ee7b7;
      --muted:     #4b7a5a;
      --danger:    #f87171;
      --danger-bg: #2d0a0a;
      --warn:      #fbbf24;
      --mono:      'Share Tech Mono', monospace;
      --body:      'Heebo', sans-serif;
      --radius:    6px;
      --shadow:    0 4px 24px rgba(0,0,0,0.6);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--body);
      font-size: 14px;
      min-height: 100vh;
    }

    /* ── TOPBAR ── */
    .topbar {
      background: var(--bg2);
      border-bottom: 2px solid var(--border2);
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 52px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .topbar-brand {
      font-family: var(--mono);
      color: var(--green);
      font-size: 17px;
      font-weight: bold;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .topbar-brand .star { color: var(--green); font-size: 20px; }
    .topbar-brand .sub { color: var(--muted); font-size: 11px; display: block; line-height: 1; }
    .topbar-nav {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .topbar-user {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text2);
      background: var(--bg3);
      border: 1px solid var(--border);
      padding: 4px 10px;
      border-radius: var(--radius);
      margin-left: 10px;
    }

    /* ── BUTTONS ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 14px;
      border-radius: var(--radius);
      font-family: var(--mono);
      font-size: 12px;
      font-weight: bold;
      cursor: pointer;
      border: none;
      text-decoration: none;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .btn-primary {
      background: var(--green3);
      color: #fff;
      border: 1px solid var(--green2);
    }
    .btn-primary:hover { background: var(--green2); }
    .btn-secondary {
      background: var(--bg4);
      color: var(--text2);
      border: 1px solid var(--border2);
    }
    .btn-secondary:hover { border-color: var(--green); color: var(--green); }
    .btn-ghost {
      background: transparent;
      color: var(--text2);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { border-color: var(--green2); color: var(--green); }
    .btn-danger {
      background: #7f1d1d;
      color: var(--danger);
      border: 1px solid #b91c1c;
    }
    .btn-danger:hover { background: #991b1b; }
    .btn-sm { padding: 4px 10px; font-size: 11px; }
    .btn-lg { padding: 10px 22px; font-size: 14px; }
    .btn-full { width: 100%; justify-content: center; }
    .btn-icon { padding: 5px 8px; }

    /* ── LINKS as buttons ── */
    a.btn { color: inherit; }
    a.btn-secondary { color: var(--text2); }
    a.btn-secondary:hover { color: var(--green); }
    a.btn-ghost:hover { color: var(--green); }

    /* ── LAYOUT ── */
    .page { padding: 16px 20px 40px; max-width: 1100px; margin: 0 auto; }
    .page-title {
      font-family: var(--mono);
      font-size: 20px;
      color: var(--green);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .page-title::before {
      content: '▌';
      color: var(--green2);
    }

    /* ── GRID LAYOUTS ── */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
    .grid-auto { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }

    /* ── CARD ── */
    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .card-header {
      background: var(--bg3);
      border-bottom: 1px solid var(--border);
      padding: 10px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .card-title {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--green);
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .card-body { padding: 14px; }
    .card-actions {
      padding: 10px 14px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    /* ── COLLAPSIBLE ── */
    .collapsible { }
    .collapsible-toggle {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      color: var(--green);
      font-family: var(--mono);
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      text-align: right;
      margin-bottom: 2px;
    }
    .collapsible-toggle:hover { border-color: var(--border2); background: var(--bg4); }
    .collapsible-toggle .arrow { transition: transform 0.2s; }
    .collapsible-content { display: none; }
    .collapsible-content.open { display: block; }
    .coll-open .arrow { transform: rotate(180deg); }

    /* ── TABLE ── */
    .tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
    .tbl th {
      background: var(--bg3);
      color: var(--green2);
      font-family: var(--mono);
      font-size: 11px;
      text-align: right;
      padding: 7px 10px;
      border-bottom: 2px solid var(--border2);
      white-space: nowrap;
    }
    .tbl td {
      padding: 8px 10px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    .tbl tr:last-child td { border-bottom: none; }
    .tbl tr:hover td { background: var(--bg3); }
    .tbl .mono { font-family: var(--mono); color: var(--green2); font-size: 12px; }
    .tbl .actions { display: flex; gap: 5px; flex-wrap: wrap; }

    /* ── FORM ── */
    .form-row { margin-bottom: 12px; }
    .form-label {
      display: block;
      color: var(--text2);
      font-size: 12px;
      font-family: var(--mono);
      margin-bottom: 4px;
    }
    .form-input, .form-select, .form-textarea {
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      padding: 7px 10px;
      font-family: var(--body);
      font-size: 13px;
      width: 100%;
      outline: none;
      transition: border-color 0.15s;
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 2px rgba(74,222,128,0.1);
    }
    .form-select option { background: var(--bg2); }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .form-inline { display: flex; gap: 8px; align-items: flex-end; }
    .form-inline .form-row { flex: 1; margin-bottom: 0; }

    /* ── BADGE ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 2px 8px;
      border-radius: 99px;
      font-size: 11px;
      font-family: var(--mono);
      font-weight: bold;
    }
    .badge-green { background: #052e16; color: var(--green); border: 1px solid var(--green-dim); }
    .badge-yellow { background: #451a03; color: var(--warn); border: 1px solid #92400e; }
    .badge-blue { background: #0c1a40; color: #60a5fa; border: 1px solid #1e3a8a; }
    .badge-muted { background: var(--bg3); color: var(--muted); border: 1px solid var(--border); }

    /* ── FLASH ── */
    .flash {
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 13px;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .flash-info { background: #052e16; border: 1px solid var(--green3); color: var(--text2); }
    .flash-error { background: var(--danger-bg); border: 1px solid #b91c1c; color: var(--danger); }

    /* ── DIVIDER ── */
    .divider { border: none; border-top: 1px solid var(--border); margin: 14px 0; }

    /* ── STAT BOX ── */
    .stat-box {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      text-align: center;
    }
    .stat-num { font-family: var(--mono); font-size: 28px; color: var(--green); line-height: 1; }
    .stat-label { font-size: 11px; color: var(--muted); margin-top: 4px; font-family: var(--mono); }

    /* ── EMPTY ── */
    .empty { text-align: center; padding: 30px; color: var(--muted); font-family: var(--mono); font-size: 13px; }
    .empty::before { content: '//'; margin-left: 5px; }

    /* ── SECTION HEADER ── */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .section-title {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* ── EXERCISE ROW card ── */
    .ex-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      gap: 10px;
    }
    .ex-row:last-child { border-bottom: none; }
    .ex-row:hover { background: var(--bg3); }
    .ex-info { flex: 1; min-width: 0; }
    .ex-title { font-weight: 600; font-size: 13px; color: var(--text); }
    .ex-meta { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-top: 2px; }
    .ex-btns { display: flex; gap: 5px; flex-shrink: 0; }

    /* ── LOGIN ── */
    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at center, #0d1f0d 0%, #060c06 100%);
    }
    .login-box {
      width: 380px;
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: var(--shadow), 0 0 60px rgba(34,197,94,0.06);
    }
    .login-head {
      background: var(--bg3);
      border-bottom: 2px solid var(--green3);
      padding: 24px;
      text-align: center;
    }
    .login-star { font-size: 36px; color: var(--green); }
    .login-title { font-family: var(--mono); font-size: 18px; color: var(--green); margin-top: 6px; }
    .login-sub { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-top: 4px; letter-spacing: 2px; }
    .login-body { padding: 24px; }
    .demo-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin-top: 10px; }
    .demo-item {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px;
      text-align: center;
    }
    .demo-role { font-family: var(--mono); font-size: 10px; color: var(--muted); }
    .demo-cred { font-family: var(--mono); font-size: 11px; color: var(--green2); margin-top: 3px; }

    /* ── TABS (simulated via hash) ── */
    .tabs { display: flex; gap: 0; border-bottom: 2px solid var(--border); margin-bottom: 14px; }
    .tab-link {
      padding: 8px 16px;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
      text-decoration: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: all 0.15s;
    }
    .tab-link:hover { color: var(--text2); }
    .tab-link.active { color: var(--green); border-bottom-color: var(--green); }

    /* ── RESPONSIVE ── */
    @media (max-width: 640px) {
      .grid-2, .grid-3 { grid-template-columns: 1fr; }
      .form-grid { grid-template-columns: 1fr; }
      .page { padding: 10px 12px; }
    }

    /* ── SCANLINE effect on topbar ── */
    .topbar::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.05) 2px, rgba(0,0,0,0.05) 4px);
      pointer-events: none;
    }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }


    /* ── ASSIGNMENTS PAGE ── */
    .user-chip {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 10px;
      margin-bottom: 6px;
      cursor: grab;
      transition: border-color 0.15s, box-shadow 0.15s;
      line-height: 1.4;
    }
    .user-chip:hover { border-color: var(--border2); box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
    .user-chip:active { cursor: grabbing; }

    .ex-drop-col {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 10px;
      overflow: hidden;
      transition: border-color 0.15s;
    }
    .ex-drop-col.drag-over {
      border-color: var(--green);
      box-shadow: 0 0 0 2px rgba(74,222,128,0.15);
    }
    .ex-drop-header {
      background: var(--bg4);
      border-bottom: 1px solid var(--border);
      padding: 8px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .ex-drop-body {
      padding: 8px;
      min-height: 48px;
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      align-content: flex-start;
    }
    .ex-drop-body:empty::after {
      content: 'גרור חייל לכאן...';
      color: var(--muted);
      font-family: var(--mono);
      font-size: 11px;
      padding: 6px;
      width: 100%;
      text-align: center;
    }
    .assigned-chip {
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: 4px;
      padding: 4px 6px 4px 8px;
      font-size: 12px;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      line-height: 1.3;
    }
    .assigned-chip span { display: block; }
    .chip-remove {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 12px;
      padding: 0 2px;
      line-height: 1;
      flex-shrink: 0;
    }
    .chip-remove:hover { color: var(--danger); }
    /* ── DATE PICKER ── */
    .dp-wrap { position: relative; }
    .dp-trigger {
      width: 100%; background: var(--bg); color: var(--text);
      border: 1px solid var(--border2); border-radius: var(--radius);
      padding: 7px 10px; font-family: var(--body); font-size: 13px;
      cursor: pointer; text-align: right; display: flex;
      align-items: center; justify-content: space-between; gap: 8px;
      transition: border-color 0.15s;
    }
    .dp-trigger:hover, .dp-trigger.open { border-color: var(--green); }
    .dp-trigger .dp-icon { color: var(--green2); font-size: 15px; flex-shrink: 0; }
    .dp-trigger .dp-val { flex: 1; }
    .dp-trigger .dp-placeholder { color: var(--muted); }
    .dp-popup {
      display: none; position: fixed;
      z-index: 9999; background: var(--bg2); border: 1px solid var(--border2);
      border-radius: var(--radius); box-shadow: 0 8px 32px rgba(0,0,0,0.7); width: 272px; padding: 12px;
    }
    .dp-popup.open { display: block; }
    .dp-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .dp-nav {
      background: var(--bg3); border: 1px solid var(--border); color: var(--text2);
      border-radius: var(--radius); padding: 3px 8px; cursor: pointer; font-size: 14px; line-height: 1;
    }
    .dp-nav:hover { border-color: var(--green); color: var(--green); }
    .dp-month-label { font-family: var(--mono); font-size: 13px; color: var(--green); font-weight: bold; cursor: pointer; }
    .dp-month-label:hover { color: var(--green2); }
    .dp-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; text-align: center; }
    .dp-dow { font-family: var(--mono); font-size: 10px; color: var(--muted); padding: 3px 0; }
    .dp-day {
      font-size: 12px; padding: 5px 2px; border-radius: 4px; cursor: pointer;
      color: var(--text); border: 1px solid transparent; line-height: 1;
    }
    .dp-day:hover { background: var(--bg4); border-color: var(--border2); }
    .dp-day.today { border-color: var(--green-dim); color: var(--green2); }
    .dp-day.selected { background: var(--green3); color: #fff; border-color: var(--green2); }
    .dp-day.other-month { color: var(--muted); }
    .dp-day.empty { cursor: default; pointer-events: none; }
    .dp-year-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; }
    .dp-year-btn {
      font-family: var(--mono); font-size: 11px; padding: 5px; border-radius: 4px;
      cursor: pointer; text-align: center; color: var(--text2); border: 1px solid transparent;
    }
    .dp-year-btn:hover { background: var(--bg4); border-color: var(--border2); }
    .dp-year-btn.selected { background: var(--green3); color: #fff; border-color: var(--green2); }

    /* ── ASSIGNMENTS PAGE ── */
    .user-chip {
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding: 8px 10px;
      margin-bottom: 5px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: grab;
      user-select: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .user-chip:hover {
      border-color: var(--border2);
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .user-chip:active { cursor: grabbing; }

    .ex-drop-col {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 10px;
      overflow: hidden;
      transition: border-color 0.15s;
    }
    .ex-drop-col.drag-over {
      border-color: var(--green);
      box-shadow: 0 0 0 2px rgba(74,222,128,0.15);
    }
    .ex-drop-header {
      background: var(--bg3);
      border-bottom: 1px solid var(--border);
      padding: 8px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .ex-drop-body {
      min-height: 60px;
      padding: 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }
    .ex-drop-body:empty::after {
      content: '// גרור לכאן';
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      padding: 8px;
    }

    .assigned-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: var(--bg4);
      border: 1px solid var(--border2);
      border-radius: 99px;
      padding: 3px 6px 3px 10px;
      font-size: 12px;
      white-space: nowrap;
    }
    .assigned-chip > span:first-child { font-weight: 600; }
    .chip-remove {
      background: transparent;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 11px;
      padding: 0 2px;
      line-height: 1;
      border-radius: 50%;
      transition: color 0.1s;
    }
    .chip-remove:hover { color: var(--danger); }
  </style>
</head>

<?!= body ?>
<script>
  // Inline edit-panel toggle for user rows
  function toggleEditPanel(btn) {
    const targetId = btn.dataset.target;
    const row = document.getElementById(targetId);
    if (!row) return;
    const isOpen = row.style.display !== 'none' && row.style.display !== '';
    row.style.display = isOpen ? 'none' : 'table-row';
    btn.textContent = isOpen ? '✏ עריכה' : '✕ סגור';
    btn.classList.toggle('btn-ghost', isOpen);
    btn.classList.toggle('btn-secondary', !isOpen);
  }

  // Confirm-before-delete for all 🗑 delete buttons
  function confirmDelete(el) {
    const msg = el.dataset.confirm || 'בטוח שרוצים למחוק?';
    if (!confirm(msg)) return false;
    // Show brief loading state
    el.textContent = '⏳...';
    el.style.pointerEvents = 'none';
    return true;
  }

  // Collapsible toggle (for .collapsible-toggle buttons)
  document.querySelectorAll('.collapsible-toggle').forEach(btn => {
    btn.addEventListener('click', function() {
      const content = this.nextElementSibling;
      const isOpen = content.classList.toggle('open');
      this.classList.toggle('coll-open', isOpen);
    });
  });

  // Mini-tab switcher — uses data-target, no onclick quoting issues
  document.addEventListener('click', function(e) {
    const tab = e.target.closest('.dp-tab');
    if (!tab) return;
    const targetId = tab.dataset.target;
    const panel = document.getElementById(targetId);
    if (!panel) return;
    const tabRow = tab.parentElement;
    const card   = tabRow.parentElement;
    tabRow.querySelectorAll('.dp-tab').forEach(t => {
      t.style.color = 'var(--muted)';
      t.style.borderBottom = 'none';
    });
    card.querySelectorAll('.dp-panel').forEach(p => { p.style.display = 'none'; });
    tab.style.color = 'var(--green)';
    tab.style.borderBottom = '2px solid var(--green)';
    panel.style.display = 'block';
  });

  // Manual toggle by ID (used in exercise page inline buttons)
  function toggleCollapsible(id) {
    const el = document.getElementById(id);
    if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
  }

  // ── Hebrew Date Picker ──
  const HEB_MONTHS = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
  const HEB_DAYS_SHORT = ['א','ב','ג','ד','ה','ו','ש']; // Sun..Sat

  function initDatePickers() {
    document.querySelectorAll('.dp-wrap').forEach(wrap => {
      const hidden  = wrap.querySelector('input[type=hidden]');
      const trigger = wrap.querySelector('.dp-trigger');
      const popup   = wrap.querySelector('.dp-popup');
      const valSpan = trigger.querySelector('.dp-val');

      let cur = new Date();
      cur.setDate(1);
      let selectedDate = null;
      let yearMode = false;

      // Parse existing value
      if (hidden.value) {
        const parts = hidden.value.split('-');
        if (parts.length === 3) {
          selectedDate = new Date(+parts[0], +parts[1]-1, +parts[2]);
          cur = new Date(selectedDate.getFullYear(), selectedDate.getMonth(), 1);
          updateTriggerLabel();
        }
      }

      function updateTriggerLabel() {
        if (selectedDate) {
          const d = selectedDate;
          const days = ['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
          valSpan.innerHTML = '<span>' + days[d.getDay()] + ', ' + d.getDate() + ' ב' + HEB_MONTHS[d.getMonth()] + ' ' + d.getFullYear() + '</span>';
        } else {
          valSpan.innerHTML = '<span class="dp-placeholder">בחר תאריך...</span>';
        }
      }

      function renderCalendar() {
        if (yearMode) { renderYearGrid(); return; }
        const year = cur.getFullYear(), month = cur.getMonth();
        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month+1, 0).getDate();
        const today = new Date();

        let html = '<div class="dp-header">' +
          '<button type="button" class="dp-nav" data-action="prev">&#8250;</button>' +
          '<span class="dp-month-label" data-action="year-mode">' + HEB_MONTHS[month] + ' ' + year + '</span>' +
          '<button type="button" class="dp-nav" data-action="next">&#8249;</button>' +
          '</div><div class="dp-grid">';
        HEB_DAYS_SHORT.forEach(d => { html += '<div class="dp-dow">' + d + '</div>'; });
        // empty cells before first day
        for (let i = 0; i < firstDay; i++) html += '<div class="dp-day empty"></div>';
        for (let d = 1; d <= daysInMonth; d++) {
          const isToday = (d === today.getDate() && month === today.getMonth() && year === today.getFullYear());
          const isSel = selectedDate && (d === selectedDate.getDate() && month === selectedDate.getMonth() && year === selectedDate.getFullYear());
          html += '<div class="dp-day' + (isToday?' today':'') + (isSel?' selected':'') + '" data-day="' + d + '">' + d + '</div>';
        }
        html += '</div>';
        popup.innerHTML = html;
        popup.querySelectorAll('[data-action]').forEach(el => {
          el.addEventListener('click', e => { e.stopPropagation(); handleNav(el.dataset.action); });
        });
        popup.querySelectorAll('[data-day]').forEach(el => {
          el.addEventListener('click', e => { e.stopPropagation(); selectDay(+el.dataset.day); });
        });
      }

      function renderYearGrid() {
        const selYear = cur.getFullYear();
        const start = selYear - 6;
        let html = '<div class="dp-header">' +
          '<button type="button" class="dp-nav" data-action="year-prev">&#8250;</button>' +
          '<span style="font-family:var(--mono);font-size:13px;color:var(--text2)">בחר שנה</span>' +
          '<button type="button" class="dp-nav" data-action="year-next">&#8249;</button>' +
          '</div><div class="dp-year-grid">';
        for (let y = start; y < start+12; y++) {
          html += '<div class="dp-year-btn' + (y===selYear?' selected':'') + '" data-year="'+y+'">'+y+'</div>';
        }
        html += '</div>';
        popup.innerHTML = html;
        popup.querySelectorAll('[data-action]').forEach(el => {
          el.addEventListener('click', e => { e.stopPropagation(); handleNav(el.dataset.action); });
        });
        popup.querySelectorAll('[data-year]').forEach(el => {
          el.addEventListener('click', e => { e.stopPropagation(); cur.setFullYear(+el.dataset.year); yearMode=false; renderCalendar(); });
        });
      }

      function handleNav(action) {
        if (action === 'prev') { cur.setMonth(cur.getMonth()-1); renderCalendar(); }
        else if (action === 'next') { cur.setMonth(cur.getMonth()+1); renderCalendar(); }
        else if (action === 'year-mode') { yearMode = true; renderCalendar(); }
        else if (action === 'year-prev') { cur.setFullYear(cur.getFullYear()-12); renderCalendar(); }
        else if (action === 'year-next') { cur.setFullYear(cur.getFullYear()+12); renderCalendar(); }
      }

      function selectDay(day) {
        selectedDate = new Date(cur.getFullYear(), cur.getMonth(), day);
        const y = selectedDate.getFullYear();
        const m = String(selectedDate.getMonth()+1).padStart(2,'0');
        const d = String(selectedDate.getDate()).padStart(2,'0');
        hidden.value = y + '-' + m + '-' + d;
        updateTriggerLabel();
        popup.classList.remove('open');
        trigger.classList.remove('open');
      }

      trigger.addEventListener('click', e => {
        e.stopPropagation();
        const isOpen = popup.classList.toggle('open');
        trigger.classList.toggle('open', isOpen);
        if (isOpen) {
          yearMode = false;
          renderCalendar();
          // Smart positioning: place popup below trigger, flip if not enough room
          const rect = trigger.getBoundingClientRect();
          const popW = 272, popH = 280;
          let top = rect.bottom + 4;
          let left = rect.right - popW;
          // Flip above if not enough room below
          if (top + popH > window.innerHeight - 10) top = rect.top - popH - 4;
          // Keep within left edge
          if (left < 8) left = 8;
          // Keep within right edge
          if (left + popW > window.innerWidth - 8) left = window.innerWidth - popW - 8;
          popup.style.top = top + 'px';
          popup.style.left = left + 'px';
        }
      });

      document.addEventListener('click', () => {
        popup.classList.remove('open');
        trigger.classList.remove('open');
      });
      window.addEventListener('resize', () => {
        popup.classList.remove('open');
        trigger.classList.remove('open');
      });
      popup.addEventListener('click', e => e.stopPropagation());
    });
  }

  document.addEventListener('DOMContentLoaded', initDatePickers);
  // Also run immediately in case DOMContentLoaded already fired
  if (document.readyState !== 'loading') initDatePickers();

  // ═══════════════════════════════════════
  //  Excel / CSV bulk import
  // ═══════════════════════════════════════
  document.addEventListener('change', function(e) {
    if (e.target && e.target.id === 'xlsxFile') handleXlsxFile(e.target);
  });

  function handleXlsxFile(input) {
    const preview   = document.getElementById('xlsxPreview');
    const previewTb = document.getElementById('xlsxPreviewTable');
    const errDiv    = document.getElementById('xlsxError');
    const importBtn = document.getElementById('xlsxImportBtn');

    errDiv.style.display  = 'none';
    preview.style.display = 'none';
    importBtn.style.display = 'none';
    if (!input.files || !input.files[0]) return;

    const file = input.files[0];
    const name = file.name.toLowerCase();
    const reader = new FileReader();

    if (name.endsWith('.csv')) {
      reader.onload = function(e) {
        try {
          const rows = parseCSV(e.target.result);
          showXlsxPreview(rows, previewTb, preview, importBtn, errDiv);
        } catch(err) { showXlsxError(errDiv, err.message); }
      };
      reader.readAsText(file, 'UTF-8');
    } else {
      // XLSX — read as binary, parse with basic method
      reader.onload = function(e) {
        try {
          const rows = parseXLSXBasic(e.target.result);
          showXlsxPreview(rows, previewTb, preview, importBtn, errDiv);
        } catch(err) { showXlsxError(errDiv, 'לא ניתן לקרוא קובץ XLSX ישירות. אנא שמור כ-CSV ונסה שנית.'); }
      };
      reader.readAsBinaryString(file);
    }
  }

  function parseCSV(text) {
    const lines = text.trim().split(/\r?\n/);
    if (lines.length < 2) throw new Error('הקובץ ריק או חסרה שורת כותרת.');
    const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
    return lines.slice(1).filter(l => l.trim()).map(function(line) {
      const vals = line.split(',').map(v => v.trim().replace(/^"|"$/g, ''));
      const obj = {};
      headers.forEach(function(h, i) { obj[h] = vals[i] || ''; });
      return obj;
    });
  }

  function parseXLSXBasic(binary) {
    // Very basic XLSX parser — extracts shared strings and sheet data
    // For full support, user should export as CSV
    throw new Error('XLSX');
  }

  function showXlsxPreview(rows, previewTb, preview, importBtn, errDiv) {
    if (!rows.length) { showXlsxError(errDiv, 'לא נמצאו שורות בקובץ.'); return; }

    // Validate required columns
    const required = ['id', 'name', 'password'];
    const keys = Object.keys(rows[0]);
    const missing = required.filter(r => !keys.includes(r));
    if (missing.length) {
      showXlsxError(errDiv, 'חסרות עמודות: ' + missing.join(', ') + '. נדרש: id, name, password, role (אופציונלי), team_id (אופציונלי)');
      return;
    }

    // Build preview table (max 5 rows)
    const cols = ['id','name','role','password','team_id'];
    let tbl = '<table class="tbl" style="font-size:11px"><thead><tr>' +
      cols.map(function(c) { return '<th>' + c + '</th>'; }).join('') +
      '</tr></thead><tbody>';
    rows.slice(0, 5).forEach(function(row) {
      tbl += '<tr>' + cols.map(function(col) {
        const v = row[col] || '';
        return '<td>' + (col === 'password' ? '••••' : v) + '</td>';
      }).join('') + '</tr>';
    });
    if (rows.length > 5) tbl += '<tr><td colspan="' + cols.length + '" style="color:var(--muted);text-align:center">... ועוד ' + (rows.length-5) + ' שורות</td></tr>';
    tbl += '</tbody></table>';
    tbl += '<div style="font-family:var(--mono);font-size:11px;color:var(--green);margin-top:6px">סה״כ: ' + rows.length + ' משתמשים לייבוא</div>';

    previewTb.innerHTML = tbl;
    preview.style.display = 'block';
    importBtn.style.display = 'inline-block';

    // Store parsed rows for import
    importBtn._rows = rows;
  }

  function showXlsxError(errDiv, msg) {
    errDiv.textContent = '⚠ ' + msg;
    errDiv.style.display = 'block';
  }

  function doXlsxImport() {
    const btn    = document.getElementById('xlsxImportBtn');
    const sid    = document.getElementById('xlsxSid').value;
    const appUrl = document.getElementById('xlsxAppUrl').value;
    const rows   = btn._rows;
    if (!rows || !rows.length) return;

    btn.textContent = '⏳ מייבא...';
    btn.disabled = true;

    const url = appUrl + '?action=importUsers&sid=' + encodeURIComponent(sid) +
      '&usersJson=' + encodeURIComponent(JSON.stringify(rows));

    // Navigate top frame to the import action URL
    window.top.location.href = url;
  }

</script>
